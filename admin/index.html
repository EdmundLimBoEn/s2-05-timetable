<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>S2-05 Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <!-- ── Login ──────────────────────────────────────────────── -->
  <div id="loginSection" class="hidden">
    <div class="login-card">
      <span class="login-title">S2-05 ADMIN<span class="cursor">█</span></span>
      <span class="login-sub">TIMETABLE MANAGEMENT</span>
      <form id="loginForm" autocomplete="on">
        <input class="login-field" id="loginUser" type="text"
               placeholder="username" autocomplete="username" required>
        <input class="login-field" id="loginPass" type="password"
               placeholder="password" autocomplete="current-password" required>
        <button class="login-submit" id="loginBtn" type="submit">LOGIN</button>
      </form>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- ── Dashboard ──────────────────────────────────────────── -->
  <div id="dashboard" class="hidden">
    <header class="admin-topbar">
      <span class="admin-title">S2-05 ADMIN<span class="cursor">█</span></span>
      <span class="admin-user-chip" id="adminUser"></span>
      <button class="btn danger small" id="logoutBtn">LOGOUT</button>
    </header>

    <nav class="admin-tabs">
      <button class="admin-tab active" data-tab="timetable">TIMETABLE</button>
      <button class="admin-tab"        data-tab="exams">EXAMS</button>
      <button class="admin-tab"        data-tab="announcements">ANNCS</button>
      <button class="admin-tab"        data-tab="overrides">OVERRIDES</button>
    </nav>

    <!-- Timetable tab -->
    <div class="admin-content" id="tabTimetable">
      <div style="height:16px"></div>
      <div class="tt-controls">
        <div class="week-toggle">
          <button class="week-btn active" data-week="odd">ODD WEEK</button>
          <button class="week-btn"        data-week="even">EVEN WEEK</button>
        </div>
        <div class="hours-toggle">
          <span class="hours-label">SCHOOL DAY ENDS</span>
          <div class="week-toggle">
            <button class="week-btn active" id="hoursShort">3 PM</button>
            <button class="week-btn"        id="hoursExtended">5 PM</button>
          </div>
        </div>
      </div>
      <div class="last-saved" id="lastSaved"></div>
      <div id="dayCards"></div>
      <div class="save-bar">
        <button class="btn primary" id="saveTimetableBtn">SAVE TIMETABLE</button>
        <span class="save-status" id="saveTimetableStatus"></span>
      </div>
    </div>

    <!-- Exams tab -->
    <div class="admin-content hidden" id="tabExams">
      <div style="height:16px"></div>
      <p style="font-family:'Space Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.2);letter-spacing:.1em;margin-bottom:16px">
        UPCOMING EXAM DATES · shown on the public site within 7 days of each exam
      </p>
      <div id="examsList"></div>
      <button class="btn small" id="addExamBtn" style="margin-bottom:12px">+ ADD EXAM</button>
      <div class="save-bar">
        <button class="btn primary" id="saveExamsBtn">SAVE EXAMS</button>
        <span class="save-status" id="saveExamsStatus"></span>
      </div>
    </div>
  </div>

    <!-- Announcements tab -->
    <div class="admin-content hidden" id="tabAnnouncements">
      <div style="height:16px"></div>
      <p style="font-family:'Space Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.2);letter-spacing:.1em;margin-bottom:16px">
        ANNOUNCEMENTS · posted to all users on the public site within 10 seconds
      </p>

      <div class="annc-form">
        <div class="annc-form-row">
          <input class="exam-label-input" id="anncTitle" type="text" placeholder="Title (required)" maxlength="100">
          <select class="annc-cat-select" id="anncCategory">
            <option value="general">GENERAL</option>
            <option value="homework">HOMEWORK</option>
            <option value="exam">EXAM</option>
            <option value="event">EVENT</option>
          </select>
        </div>
        <textarea class="annc-body-input" id="anncBody" placeholder="Body (optional)" maxlength="5000" rows="3"></textarea>
        <button class="btn primary large" id="addAnncBtn">POST ANNOUNCEMENT</button>
      </div>

      <div id="anncsList" style="margin-top:16px"></div>
    </div>

    <!-- Overrides tab -->
    <div class="admin-content hidden" id="tabOverrides">
      <div style="height:16px"></div>
      <p style="font-family:'Space Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.2);letter-spacing:.1em;margin-bottom:16px">
        SCHEDULE OVERRIDES · mark a date as holiday or a custom one-off day
      </p>

      <div class="ovr-form">
        <div class="ovr-form-row">
          <input class="exam-date-input" id="ovrDate" type="date">
          <select class="annc-cat-select" id="ovrType">
            <option value="holiday">HOLIDAY</option>
            <option value="custom">CUSTOM DAY</option>
          </select>
          <input class="exam-label-input" id="ovrLabel" type="text" placeholder="Label (e.g. Vesak Day)" maxlength="80">
        </div>
        <button class="btn primary large" id="addOvrBtn">+ ADD OVERRIDE</button>
      </div>

      <div id="ovrsList" style="margin-top:16px"></div>
    </div>
  </div>

  <div id="toast"></div>
  <div id="saveBar" class="save-bar-indicator" style="display:none">
    <span id="saveBarDot">●</span>&nbsp;<span id="saveBarText">SAVING...</span>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
