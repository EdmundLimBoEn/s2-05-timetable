<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>S2-05 · Term 2 2026</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <div class="scanlines" aria-hidden="true"></div>

  <header class="topbar">
    <div class="topbar-left">
      <h1 class="title">S2-05<span class="cursor">█</span></h1>
      <span class="today-pill" id="todayPill"></span>
      <span class="term-pill" id="termPill"></span>
      <span class="break-pill" id="breakPill" style="display:none"></span>
    </div>
    <div class="topbar-right">
      <span class="offline-badge" id="offlineBadge" style="display:none">OFFLINE</span>
      <button class="clr-btn" id="btnTheme" title="Settings" aria-label="Open settings">SET</button>
      <div class="tog-group" role="group" aria-label="Week selector">
        <div class="tog-pill" id="pillWeek"></div>
        <button class="tog-btn" id="btnOdd" onclick="setWeek('odd')" aria-pressed="true">ODD</button>
        <button class="tog-btn" id="btnEven" onclick="setWeek('even')" aria-pressed="false">EVEN</button>
      </div>
    </div>
  </header>

  <div class="annc-toast" id="anncToast" style="display:none">
    <div class="annc-toast-stripe"></div>
    <div class="annc-toast-body">
      <span class="annc-toast-cat" id="anncToastCat"></span>
      <span class="annc-toast-title" id="anncToastTitle"></span>
    </div>
    <button class="annc-toast-close" id="anncToastClose">&#x2715;</button>
  </div>

  <div class="sw-update-bar" id="swUpdateBar" style="display:none">
    <span>UPDATE AVAILABLE</span>
    <button class="sw-refresh-btn" onclick="location.reload()">&#8635; REFRESH</button>
  </div>

  <div class="now-bar" id="nowBar" style="display:none">
    <span class="now-dot"></span>
    <span class="now-label">NOW</span>
    <span class="now-subject" id="nowSubj"></span>
    <span class="now-countdown" id="nowCountdown"></span>
    <span class="now-ends" id="nowEnds"></span>
  </div>

  <div class="next-bar" id="nextBar" style="display:none">
    <span class="next-label">NEXT</span>
    <span class="next-subject" id="nextSubj"></span>
    <span class="next-time" id="nextTime"></span>
  </div>

  <div class="glance-bar" id="glanceBar" style="display:none">
    <span class="now-dot"></span>
    <span class="glance-text" id="glanceText"></span>
  </div>

  <div class="upcoming-bar" id="upcomingBar" style="display:none">
    <span class="upcoming-label" id="upcomingLabel">NEXT</span>
    <span class="upcoming-day" id="upcomingDay"></span>
    <span class="upcoming-detail" id="upcomingDetail"></span>
  </div>

  <div class="exam-bar" id="examBar" style="display:none">
    <span class="exam-icon">&#x23F3;</span>
    <span class="exam-text" id="examText"></span>
  </div>

  <div class="bring-bar" id="bringBar" style="display:none">
    <span class="bring-label">TODAY</span>
    <span class="bring-subjects" id="bringSubjects"></span>
  </div>

  <div class="demo-banner" id="demoBanner" style="display:none">
    <span class="demo-badge">⚡ DEMO</span>
    <span class="demo-banner-info" id="demoBannerInfo"></span>
  </div>

  <main class="table-wrap" id="tableWrap">
    <div class="time-line" id="tl" style="display:none"></div>
  </main>

  <section class="bottom-panel" id="bottomPanel">
    <div class="bottom-panel-toolbar" id="resizeHandle">
      <div class="resize-grip"></div>
      <div class="bottom-toolbar-center">
        <div class="tog-group" id="bottomPaneToggle" style="display:none">
          <div class="tog-pill" id="pillBottomPane"></div>
          <button class="tog-btn" id="btnPaneJournal" onclick="setBottomPane('journal')" aria-pressed="true">JOURNAL</button>
          <button class="tog-btn" id="btnPaneAnncs" onclick="setBottomPane('anncs')" aria-pressed="false">ANNCS</button>
        </div>
      </div>
      <div class="tog-group bottom-layout-tog">
        <div class="tog-pill" id="pillLayout"></div>
        <button class="tog-btn" id="btnLayoutSplit" onclick="setBottomLayout('split')" aria-pressed="true">SPLIT</button>
        <button class="tog-btn" id="btnLayoutSingle" onclick="setBottomLayout('single')" aria-pressed="false">SINGLE</button>
      </div>
    </div>
    <div class="bottom-panes" id="bottomPanes">
      <div class="bottom-pane" id="journalPane">
        <div class="bottom-pane-hd">JOURNAL</div>
        <textarea id="journalText" class="journal-textarea" placeholder="Notes, todos, thoughts…" maxlength="50000"></textarea>
        <span class="bottom-hint">Saved on this device</span>
      </div>
      <div class="bottom-pane" id="anncsPane">
        <div class="bottom-pane-hd">ANNOUNCEMENTS</div>
        <div id="anncsList" class="anncs-list"></div>
      </div>
    </div>
  </section>

  <footer class="bottom">S2-05 · TERM 2 2026</footer>

  <div class="theme-overlay" id="themeOverlay"></div>
  <div class="theme-panel" id="themePanel" aria-hidden="true">
    <div class="theme-inner">
      <div class="theme-hdr">
        <span class="theme-title">SETTINGS</span>
        <button class="theme-close" id="themeClose">✕</button>
      </div>

      <div class="settings-section">
        <div class="settings-section-hd">COLOURS</div>
        <div class="theme-grid" id="themeGrid"></div>
      </div>

      <div class="settings-section">
        <div class="settings-section-hd">DEMO MODE</div>
        <label class="demo-toggle-row">
          <span class="demo-toggle-label">Simulate time &amp; day</span>
          <span class="toggle-wrap">
            <input type="checkbox" id="demoToggle">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </span>
        </label>
        <div class="demo-controls" id="demoControls" style="display:none">
          <div class="demo-row">
            <span class="demo-label">WEEK</span>
            <div class="demo-chip-group" id="demoWeekBtns">
              <button class="demo-chip" data-week="odd">ODD</button>
              <button class="demo-chip" data-week="even">EVEN</button>
            </div>
          </div>
          <div class="demo-row">
            <span class="demo-label">DAY</span>
            <div class="demo-chip-group" id="demoDayBtns">
              <button class="demo-chip" data-day="1">MON</button>
              <button class="demo-chip" data-day="2">TUE</button>
              <button class="demo-chip" data-day="3">WED</button>
              <button class="demo-chip" data-day="4">THU</button>
              <button class="demo-chip" data-day="5">FRI</button>
            </div>
          </div>
          <div class="demo-row">
            <span class="demo-label">TIME</span>
            <input type="time" id="demoTime" class="demo-time" value="11:45">
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-hd">VIEW</div>
        <label class="demo-toggle-row">
          <span class="demo-toggle-label">Compact rows</span>
          <span class="toggle-wrap">
            <input type="checkbox" id="compactToggle">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </span>
        </label>
        <label class="demo-toggle-row">
          <span class="demo-toggle-label">Compact bars (glance mode)</span>
          <span class="toggle-wrap">
            <input type="checkbox" id="compactBarsToggle">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </span>
        </label>
      </div>

      <div class="settings-section">
        <div class="settings-section-hd">DISPLAY</div>
        <p class="settings-hint">Toggle which status bars are shown.</p>
        <div id="barPrefsContainer">
          <label class="demo-toggle-row">
            <span class="demo-toggle-label">Now bar</span>
            <span class="toggle-wrap">
              <input type="checkbox" id="barPref-now" data-bar-pref="now" checked>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
          <label class="demo-toggle-row">
            <span class="demo-toggle-label">Next bar</span>
            <span class="toggle-wrap">
              <input type="checkbox" id="barPref-next" data-bar-pref="next" checked>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
          <label class="demo-toggle-row">
            <span class="demo-toggle-label">Upcoming bar</span>
            <span class="toggle-wrap">
              <input type="checkbox" id="barPref-upcoming" data-bar-pref="upcoming" checked>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
          <label class="demo-toggle-row">
            <span class="demo-toggle-label">Exam countdown</span>
            <span class="toggle-wrap">
              <input type="checkbox" id="barPref-exam" data-bar-pref="exam" checked>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
          <label class="demo-toggle-row">
            <span class="demo-toggle-label">Bring today</span>
            <span class="toggle-wrap">
              <input type="checkbox" id="barPref-bring" data-bar-pref="bring" checked>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
          <label class="demo-toggle-row">
            <span class="demo-toggle-label">Announcement toast</span>
            <span class="toggle-wrap">
              <input type="checkbox" id="barPref-toast" data-bar-pref="toast" checked>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-hd">THIS WEEK</div>
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <div class="settings-section">
        <div class="settings-section-hd">NOTIFICATIONS</div>
        <div class="notif-row">
          <span class="demo-toggle-label">5 min before each class</span>
          <button class="theme-btn notif-btn" id="notifClassBtn">ENABLE</button>
        </div>
        <div class="notif-row" style="margin-top:10px">
          <span class="demo-toggle-label">Evening reminder</span>
          <button class="theme-btn notif-btn" id="notifEveBtn">ENABLE</button>
        </div>
        <div class="notif-time-row" id="notifTimeRow" style="display:none">
          <span class="demo-label">TIME</span>
          <input type="time" id="notifTime" class="demo-time" value="19:30">
        </div>
      </div>

      <div class="theme-actions">
        <button class="theme-btn" id="installBtn" style="display:none">INSTALL APP</button>
        <button class="theme-btn" id="printBtn">PRINT</button>
        <button class="theme-btn" id="themeCopyLink">COPY LINK</button>
        <button class="theme-btn" id="themeReset">RESET ALL</button>
      </div>
    </div>
  </div>

  <div class="note-overlay" id="noteOverlay" style="display:none"></div>
  <div class="note-modal" id="noteModal" style="display:none">
    <div class="note-modal-hd">
      <span class="note-modal-title" id="noteModalTitle">NOTE</span>
      <button class="theme-close" id="noteModalClose">&#x2715;</button>
    </div>
    <input type="text" id="noteInput" class="note-input" placeholder="e.g. bring calculator" maxlength="80" autocomplete="off">
    <div class="note-extra-row">
      <label class="note-done-label">
        <input type="checkbox" id="noteDone">
        <span>Done</span>
      </label>
      <label class="note-due-label">
        <span>Due</span>
        <input type="date" id="noteDue" class="note-due-input">
      </label>
    </div>
    <div class="note-actions">
      <button class="theme-btn" id="noteSave">SAVE</button>
      <button class="theme-btn" id="noteClear">CLEAR</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const w = reg.installing
          w.addEventListener('statechange', () => {
            if (w.state === 'installed' && navigator.serviceWorker.controller) {
              document.getElementById('swUpdateBar').style.display = 'flex'
            }
          })
        })
      })
    }
  </script>
</body>
</html>
