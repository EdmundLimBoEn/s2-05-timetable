name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set target env
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dir=/root/timetable"     >> $GITHUB_OUTPUT
            echo "pm2=timetable"           >> $GITHUB_OUTPUT
          else
            echo "dir=/root/timetable-dev" >> $GITHUB_OUTPUT
            echo "pm2=timetable-dev"       >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Hack Club server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H hackclub.app >> ~/.ssh/known_hosts 2>/dev/null

          TARGET="${{ steps.env.outputs.dir }}"
          PM2="${{ steps.env.outputs.pm2 }}"

          # Sync files (skip node_modules, data, .env, .git)
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='data' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ "edmundlim@hackclub.app:$TARGET/"

          # Install deps and restart
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no edmundlim@hackclub.app "
            export NVM_DIR=\$HOME/.nvm && . \$NVM_DIR/nvm.sh
            cd $TARGET && npm install --omit=dev
            pm2 describe $PM2 > /dev/null 2>&1 \
              && pm2 restart $PM2 \
              || pm2 start ecosystem.config.cjs --name $PM2
            pm2 save
          "
