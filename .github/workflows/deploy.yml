name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            URL="https://timetable.edmundlim.systems/api/deploy"
          else
            URL="https://testing.timetable.edmundlim.systems/api/deploy"
          fi

          curl -sf -X POST "$URL" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json"
